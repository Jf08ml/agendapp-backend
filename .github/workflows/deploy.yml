name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Ejecutar deploy en VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /app/agendapp-backend
            git pull
            docker compose up -d --build
            echo "Esperando que el contenedor esté healthy..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q backend) 2>/dev/null)
              echo "Intento $i: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "Deploy exitoso"
                exit 0
              fi
              sleep 10
            done
            echo "El contenedor no alcanzó estado healthy en 120s"
            docker compose logs --tail=50 backend
            exit 1
